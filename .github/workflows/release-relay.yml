name: 🏁 Build & Release fh6-relay.exe

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Run relay unit tests ────────────────────────────────────────────────
  test:
    name: Relay unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: fh6-relay
        run: npm ci

      - name: Run Jest tests
        working-directory: fh6-relay
        run: npm test

  # ── 2. Build Windows installer via electron-builder, publish Release ────
  build-and-release:
    name: Build exe & publish release
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: fh6-relay
        run: npm ci

      - name: Build TypeScript + package with electron-builder
        working-directory: fh6-relay
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist

      - name: Verify installer was produced
        shell: bash
        run: ls fh6-relay/release/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: fh6-relay ${{ github.ref_name }}
          body: |
            ## fh6-relay ${{ github.ref_name }}

            Windows desktop app for capturing and auto-submitting FH6 lap times via Data Out telemetry.

            ### Setup
            1. Run `/dataout-register` in Discord to get your token.
            2. Download `FH6.Relay.Setup.*.exe` below and run the installer.
            3. Launch **FH6 Relay** from the Start Menu or Desktop shortcut.
            4. Open the Settings tab and fill in your server address, Discord User ID, username, and token.
            5. Configure FH6 Data Out → `127.0.0.1:20440`.

            See the [README](https://github.com/${{ github.repository }}#data-out-auto-submit) for full instructions.
          files: fh6-relay/release/*.exe
          generate_release_notes: false
