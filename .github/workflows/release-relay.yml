name: 🏁 Build & Release fh6-relay.exe

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Run relay unit tests ────────────────────────────────────────────────
  test:
    name: Relay unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: fh6-relay
        run: npm ci

      - name: Run Jest tests
        working-directory: fh6-relay
        run: npm test

  # ── 2. Build Windows .exe via Nuitka on native Windows, publish Release ────
  build-and-release:
    name: Build exe & publish release
    needs: test
    # GitHub-hosted Windows runner: native compilation, no Wine, no Docker.
    # Nuitka compiles Python → C → real Windows binary, which avoids the
    # PyInstaller self-extraction behaviour that triggers AV heuristics.
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install build dependencies
        working-directory: fh6-relay
        run: pip install aiohttp pystray Pillow nuitka ordered-set zstandard

      - name: Build fh6-relay.exe with Nuitka
        working-directory: fh6-relay
        run: |
          python -m nuitka `
            --standalone `
            --windows-console-mode=disable `
            --enable-plugin=tk-inter `
            --include-package=pystray `
            --include-package=PIL `
            --assume-yes-for-downloads `
            --output-filename=fh6-relay `
            --output-dir=dist `
            main.py

      - name: Verify exe was produced
        shell: bash
        run: test -f fh6-relay/dist/main.dist/fh6-relay.exe

      - name: Zip dist folder for release
        run: Compress-Archive -Path fh6-relay/dist/main.dist/* -DestinationPath fh6-relay/dist/fh6-relay.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: fh6-relay ${{ github.ref_name }}
          body: |
            ## fh6-relay ${{ github.ref_name }}

            Windows tray app for auto-submitting FH6 lap times via Data Out telemetry.

            ### Setup
            1. Run `/dataout-register` in Discord to get your token.
            2. Download `fh6-relay.zip` below and extract it to a folder.
            3. Run `fh6-relay.exe` from that folder.
            4. Fill in the first-launch setup dialog (server address, Discord User ID, username, token).
            5. Configure FH6 Data Out → `127.0.0.1:20440`.

            See the [README](https://github.com/${{ github.repository }}#data-out-auto-submit) for full instructions.
          files: fh6-relay/dist/fh6-relay.zip
          generate_release_notes: false
